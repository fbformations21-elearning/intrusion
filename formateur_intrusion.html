<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Console Formateur — Simulateur Intrusion</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0f172a;color:#e2e8f0;font-family:'Courier New',monospace;min-height:100vh;padding:12px;}
  h1{font-size:15px;color:#f59e0b;letter-spacing:.08em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #334155;}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px;}
  .badge-auto{background:#1d4ed8;color:#bfdbfe;}
  .badge-manuel{background:#d97706;color:#fef3c7;}
  .badge-hs{background:#374151;color:#9ca3af;}
  .badge-arme{background:#dc2626;color:#fee2e2;}

  .status-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:7px 10px;background:#1e293b;border-radius:6px;margin-bottom:10px;font-size:12px;}
  .status-item{display:flex;flex-direction:column;gap:2px;}
  .status-label{color:#64748b;font-size:10px;text-transform:uppercase;}
  .status-val{font-weight:700;font-size:13px;}



  /* ── Zones ES ── */
  #zones-panel{background:#1e293b;border-radius:8px;padding:10px;border:1px solid #334155;margin-bottom:10px;}
  #zones-panel h2{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
  .zones-grid{display:flex;flex-wrap:wrap;gap:5px;}
  .zone-chip{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;border:1px solid;}
  .zone-chip.mode-totale{background:#052e16;border-color:#16a34a;color:#86efac;}
  .zone-chip.mode-hs{background:#1e293b;border-color:#374151;color:#475569;}
  .zone-chip.mode-alarme{background:#1a0000;border-color:#ef4444;color:#fca5a5;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.grid{grid-template-columns:1fr;}}

  .card{background:#1e293b;border-radius:8px;padding:10px;border:1px solid #334155;}
  .card h2{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #334155;}

  select{background:#0f172a;border:1px solid #475569;color:#e2e8f0;border-radius:4px;padding:5px 8px;font-size:12px;font-family:'Courier New',monospace;width:100%;}

  .btn{padding:6px 12px;border-radius:5px;border:none;font-weight:700;font-size:11px;cursor:pointer;font-family:'Courier New',monospace;transition:all .15s;}
  .btn-red{background:#dc2626;color:#fff;}
  .btn-red:hover{background:#b91c1c;}
  .btn-gray{background:#374151;color:#d1d5db;}
  .btn-gray:hover{background:#4b5563;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

  .det-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:4px;max-height:360px;overflow-y:auto;}
  .det-btn{padding:12px 8px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:#94a3b8;font-size:13px;cursor:pointer;text-align:center;font-family:'Courier New',monospace;transition:all .15s;line-height:1.5;min-height:64px;}
  .det-btn:hover{border-color:#f59e0b;color:#fbbf24;}
  .det-btn.alarme{border-color:#ef4444;color:#fca5a5;background:#1a0000;animation:almPulse 1s ease-in-out infinite;}
  .det-btn.selected{border-color:#22c55e;color:#bbf7d0;background:#052e16;}
  .det-type{font-size:11px;opacity:.8;}

  .zone-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto;}
  .zone-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;border:1px solid #334155;background:#0f172a;cursor:pointer;transition:all .15s;}
  .zone-row:hover{border-color:#f59e0b;}
  .zone-row.selected{border-color:#22c55e;background:#052e16;}
  .zone-row.has-alarm{border-color:#ef4444;background:#1a0000;}
  .zone-color{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .zone-lbl{font-size:11px;flex:1;}
  .zone-grp{font-size:10px;color:#64748b;}

  .journal{background:#0f172a;border-radius:4px;padding:7px;max-height:180px;overflow-y:auto;font-size:10px;line-height:1.6;}
  .jl{padding:1px 0;border-bottom:1px solid #1e293b;}
  .jl.alm{color:#fca5a5;}
  .jl.warn{color:#fcd34d;}
  .jtime{color:#475569;margin-right:5px;}
</style>
</head>
<body>

<h1>🎛 Console Formateur — Intrusion
  <span id="badge-mode" class="badge badge-hs">NON CONNECTÉ</span>
  <span id="badge-sys" class="badge badge-hs">HS</span>
</h1>

<!-- Barre statut -->
<div class="status-bar">
  <div class="status-item">
    <span class="status-label">Mode</span>
    <span class="status-val" id="st-mode">—</span>
  </div>
  <div class="status-item">
    <span class="status-label">Système</span>
    <span class="status-val" id="st-sys">—</span>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <button class="btn btn-gray" onclick="pingSimulateur()">🔌 Connecter</button>
    <button class="btn btn-gray" onclick="sendReset()" id="btn-reset" disabled>🔄 Reset</button>
    <button class="btn btn-gray" id="btn-fs" onclick="toggleFS()" title="Plein écran">⛶</button>
  </div>
</div>

<!-- Alarmes actives -->
<!-- Délai -->
<div class="grid" style="grid-template-columns:1fr;">
  <!-- Déclencher par détecteur -->
  <div class="card">
    <h2>🔍 Déclencher un détecteur</h2>
    <div style="margin-bottom:6px;">
      <select id="filter-det" onchange="renderDetList()">
        <option value="">— Toutes zones —</option>
      </select>
    </div>
    <div class="det-grid" id="det-grid"><div class="alarm-empty">Non connecté</div></div>
    <div id="sel-det-label" style="font-size:11px;color:#fcd34d;min-height:16px;margin-top:6px;"></div>
    <div class="btn-row">
      <button class="btn btn-red" id="btn-trig-det" onclick="triggerDetecteur()" disabled>⚡ Déclencher</button>
    </div>
  </div>
</div>

<!-- Journal -->
<div class="card" style="margin-top:10px;">
  <h2>📋 Journal</h2>
  <div class="journal" id="journal"></div>
</div>

<script>
const GROUPS = [
  {id:'G1',label:'Zone 1 — Clôture',subzones:[
    {id:'Z1.1',label:'Z1.1 Portail/Portillon',color:'#2563eb',dets:['C15','C16']},
    {id:'Z1.2',label:'Z1.2 Barrières IR',color:'#0d9488',dets:['R4','R5','P3','P4','P5','P6']},
  ]},
  {id:'G2',label:'Zone 2 — RDC',subzones:[
    {id:'Z2.1',label:'Z2.1 Entrée / IS',color:'#2563eb',dets:['C1','C5','C6','C13','C11','C12']},
    {id:'Z2.2',label:'Z2.2 Locaux techniques',color:'#1d4ed8',dets:['C4','C14','C7','C8','C9']},
    {id:'Z2.3',label:'Z2.3 Fenêtres/Vibrations',color:'#1e40af',dets:['S1','S2','S3','S4','S5','S6','P2']},
    {id:'Z2.4',label:'Z2.4 IRP intérieurs',color:'#7c3aed',dets:['V1','V2','V3','V4']},
  ]},
  {id:'G3',label:'Zone 3 — R+1',subzones:[
    {id:'Z3.1',label:'Z3.1 IS Nord/Sud',color:'#2563eb',dets:['IS1N','IS1S']},
    {id:'Z3.2',label:'Z3.2 Couloirs',color:'#7c3aed',dets:['IR1A','IR1B','IR1C','IR1D']},
    {id:'Z3.3',label:'Z3.3 Bureau 102',color:'#2563eb',dets:['PB102']},
  ]},
  {id:'G4',label:'Zone 4 — R+2',subzones:[
    {id:'Z4.1',label:'Z4.1 IS Nord/Sud',color:'#2563eb',dets:['IS2N','IS2S']},
    {id:'Z4.2',label:'Z4.2 Couloirs',color:'#7c3aed',dets:['IR2A','IR2B','IR2C','IR2D']},
  ]},
  {id:'G5',label:'Zone 5 — R+3',subzones:[
    {id:'Z5.1',label:'Z5.1 IS Nord/Sud',color:'#2563eb',dets:['IS3N','IS3S']},
    {id:'Z5.2',label:'Z5.2 Couloirs',color:'#7c3aed',dets:['IR3A','IR3B','IR3C','IR3D']},
    {id:'Z5.3',label:'Z5.3 Bureau 309',color:'#2563eb',dets:['PB309']},
    {id:'Z5.4',label:'Z5.4 Coffre-fort 309',color:'#6d28d9',dets:['SV309']},
  ]},
];

// Map détecteur → groupe
const groupMap={};
GROUPS.forEach(function(g){ g.subzones.forEach(function(sz){ sz.dets.forEach(function(d){ groupMap[d]=g.id; }); }); });

const TYPE_CSS={vol:'t-vol',per:'t-per',peri:'t-peri',ponc:'t-ponc'};
const TYPE_LBL={vol:'VOL',per:'PER',peri:'PRH',ponc:'PNC'};

// ── Vérification token formateur ──
(function(){
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if(token !== 'FBFORM21-FORMATEUR-2026'){
    document.body.innerHTML = '<div style="background:#0f172a;color:#ef4444;font-family:Courier New;padding:40px;text-align:center;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;"><div style="font-size:24px;">🔒</div><div style="font-size:16px;font-weight:700;">Accès refusé</div><div style="font-size:12px;color:#94a3b8;">Token formateur manquant ou invalide.</div></div>';
    throw new Error('Accès refusé');
  }
})();

let _supa=null, _supaChannel=null, simState=null, selectedDet=null;

// ── Init Supabase ──
(function(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
  s.onload=function(){
    _supa=supabase.createClient('https://oebnvaxvmrmyvuiuuzwh.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lYm52YXh2bXJteXZ1aXV1endoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODYwMTUsImV4cCI6MjA5MDU2MjAxNX0.pxqus1VcvJqZx-1gGsAsLJodsUD91JGRk4CQuWme7dQ');
    _supaChannel=_supa.channel('sim-intrusion',{config:{broadcast:{self:false}}});
    _supaChannel
      .on('broadcast',{event:'STATUS'},function(payload){ handleStatus(payload.payload); })
      .subscribe(function(status){
        if(status==='SUBSCRIBED'){
          jlog('✅ Connecté à Supabase Realtime','');
          pingSimulateur();
        }
      });
  };
  document.head.appendChild(s);
})();

function pingSimulateur(){
  if(!_supaChannel){ jlog('Supabase non initialisé…','alm'); return; }
  _supaChannel.send({type:'broadcast',event:'CMD',payload:{type:'PING'}});
  jlog('Ping envoyé au simulateur…','');
  setTimeout(function(){ if(!simState) jlog('Pas de réponse — ouvre le simulateur et passe en mode MANUEL','alm'); },2000);
}

function handleStatus(msg){
  simState=msg;
  updateStatusBar();
  renderDetList();
  enableButtons();
}

function updateStatusBar(){
  if(!simState) return;
  const m=simState.mode, s=simState.systemMode;
  document.getElementById('st-mode').textContent=m?m.toUpperCase():'—';
  document.getElementById('st-sys').textContent=s?s.toUpperCase():'—';
  const bm=document.getElementById('badge-mode');
  bm.textContent=m?m.toUpperCase():'?';
  bm.className='badge '+(m==='manuel'?'badge-manuel':'badge-auto');
  const bs=document.getElementById('badge-sys');
  bs.textContent=s?s.toUpperCase():'?';
  bs.className='badge '+(s==='hs'?'badge-hs':'badge-arme');
}




function renderDetList(){
  const container=document.getElementById('det-grid');
  if(!simState||!simState.detectors){ container.innerHTML='<div class="alarm-empty">Non connecté</div>'; return; }
  const filter=document.getElementById('filter-det').value;
  // Mettre à jour le select filtre
  const sel=document.getElementById('filter-det');
  const curVal=sel.value;
  sel.innerHTML='<option value="">— Toutes zones —</option>';
  GROUPS.forEach(function(g){
    const o=document.createElement('option');
    o.value=g.id; o.textContent=g.label;
    sel.appendChild(o);
  });
  sel.value=curVal;
  const zoneModes={};
  if(simState.zones) simState.zones.forEach(function(z){ zoneModes[z.id]=z.mode; });
  let html='';
  simState.detectors.forEach(function(d){
    if(filter&&groupMap[d.id]!==filter) return;
    const isAlm=d.alarme, isSel=selectedDet===d.id;
    const isEs=!isAlm&&zoneModes[d.zone]&&zoneModes[d.zone]!=='hs';
    const tl=TYPE_LBL[d.type]||d.type;
    html+='<div class="det-btn'+(isAlm?' alarme':isEs?' es':'')+(isSel?' selected':'')+'" onclick="selectDet(\''+d.id+'\',this)" title="'+d.label+'">'
      +'<div>'+d.id+'</div>'
      +'<div class="det-type">'+tl+'</div>'
      +(isAlm?'<div style="font-size:9px;color:#ef4444;">🔴</div>':(isEs?'<div style="font-size:9px;color:#86efac;">ES</div>':''))
      +'</div>';
  });
  container.innerHTML=html||'<div class="alarm-empty">Aucun détecteur</div>';
}

function selectDet(did,el){
  selectedDet=did;
  document.querySelectorAll('.det-btn').forEach(function(b){ b.classList.remove('selected'); });
  if(el) el.classList.add('selected');
  var lbl=document.getElementById('sel-det-label');
  if(lbl&&simState&&simState.detectors){ var d=simState.detectors.find(function(x){ return x.id===did; }); lbl.textContent=d?'▶ '+d.id+' — '+d.label.substring(0,30):''; }
  enableButtons();
}

function enableButtons(){
  const connected=!!simState;
  const manuel=simState&&simState.mode==='manuel';
  document.getElementById('btn-reset').disabled=!connected;
  document.getElementById('btn-trig-det').disabled=!manuel||!selectedDet;
}




function triggerDetecteur(){
  if(!selectedDet||!_supaChannel) return;
  const d=0;
  if(_supaChannel) _supaChannel.send({type:'broadcast',event:'CMD',payload:{type:'TRIGGER_DETECTOR',detId:selectedDet,delai:d}});
  jlog('▶ Détecteur '+selectedDet,'warn');
}

function sendReset(){
  if(!bc) return;
  if(_supaChannel) _supaChannel.send({type:'broadcast',event:'CMD',payload:{type:'RESET'}});
  jlog('🔄 Reset envoyé','warn');
  simState=null; selectedZone=null; selectedDet=null;
  setTimeout(pingSimulateur,500);
}

const jList=[];
function jlog(msg,cls){
  const now=new Date().toLocaleTimeString('fr-FR',{hour12:false});
  jList.unshift({msg,cls,time:now});
  if(jList.length>80) jList.pop();
  document.getElementById('journal').innerHTML=jList.map(function(j){
    return '<div class="jl '+j.cls+'"><span class="jtime">'+j.time+'</span>'+j.msg+'</div>';
  }).join('');
}

function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(function(){});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange',function(){
  var btn=document.getElementById('btn-fs');
  if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶';
});

setTimeout(pingSimulateur,500);
setInterval(function(){ if(_supaChannel) _supaChannel.send({type:'broadcast',event:'CMD',payload:{type:'PING'}}); },5000);

jlog('Console prête — ouvre le simulateur dans un autre onglet','');
</script>
</body>
</html>
